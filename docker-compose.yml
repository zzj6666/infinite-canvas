services:
  app:
    build: .
    container_name: infinite-canvas
    ports:
      - "3000:3000"
    environment:
      PORT: 3000
      DATA_DIR: /data
      STATIC_DIR: /app/web/dist
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-admin123}
      COOKIE_SECURE: ${COOKIE_SECURE:-false}
    volumes:
      - ic-data:/data
    restart: unless-stopped

volumes:
  ic-data:
